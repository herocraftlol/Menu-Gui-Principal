# ============================================================
# HOTBAR PERSONNALISÉE
# Affichée UNIQUEMENT sur Spigot, et uniquement quand le joueur
# se trouve dans la zone de hub définie avec /hubzone pos1 puis
# /hubzone pos2 (une zone par monde). Voir /hubzone info et
# /hubzone remove pour la gérer.
#
# Champs disponibles : identiques à menu.items (slot de 0 à 8 uniquement)
# Action supplémentaire :
#   type: OPEN_MENU → Ouvre le GUI du menu principal (liste des serveurs)
# ============================================================
hotbar:
  enabled: true
  items:

    menu:
      slot: 0
      material: NETHER_STAR
      name: "&b✦ &fMenu des Mondes"
      glowing: true
      lore:
        - ""
        - "&7Ouvre le menu pour rejoindre"
        - "&7un des mini-jeux du serveur."
        - ""
        - "&eClic pour ouvrir !"
        - ""
      action:
        type: OPEN_MENU
        value: ""

    shop:
      slot: 1
      material: EMERALD
      name: "&a🛒 &2Boutique"
      glowing: false
      lore:
        - ""
        - "&7Achetez des grades et des cosmétiques."
        - ""
        - "&eClic pour ouvrir le lien !"
        - ""
      action:
        type: URL
        value: "https://boutique.votreserveur.fr"

    friend:
      slot: 2
      material: LIME_DYE
      name: "&a👥 &2Amis"
      glowing: false
      lore:
        - ""
        - "&7Voir et gérer vos amis."
        - ""
        - "&eClic pour ouvrir !"
        - ""
      action:
        type: COMMAND
        value: "friend gui"

    discord:
      slot: 3
