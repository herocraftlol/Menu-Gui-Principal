# ============================================================
#           MainMenu - Configuration Principale
#  Plugin de menu BungeeCord configurable par GUI + hotbar
# ============================================================

# === PARAMÈTRES BUNGEE ===
bungee:
  # Nom du serveur hub/lobby dans votre BungeeCord (config.yml de BungeeCord)
  hub-server: "lobby"

# === MENU PRINCIPAL (GUI ouvert via /menu) ===
menu:
  # Titre du menu (supporte les codes couleurs &)
  title: "&8✦ &bMenu Principal &8✦"
  # Taille de l'inventaire : 9, 18, 27, 36, 45 ou 54
  size: 54

  # -------------------------------------------------------
  # ITEMS PERSONNALISÉS
  # Chaque item a un identifiant unique (clé YAML)
  #
  # Champs disponibles :
  #   slot       : Position dans l'inventaire (0-53)
  #   material   : Nom du matériau Bukkit (ex: DIAMOND, GRASS_BLOCK)
  #   name       : Nom affiché (codes couleur &)
  #   lore       : Description (liste de lignes)
  #   glowing    : true = effet d'enchantement visuel
  #   custom-model-data : ID pour resource pack custom (0 = désactivé)
  #
  # Actions disponibles :
  #   type: CONNECT          → Connecte au serveur BungeeCord (value: nom serveur)
  #   type: COMMAND          → Exécute une commande en tant que joueur (value: commande)
  #   type: CONSOLE_COMMAND  → Exécute une commande en console (value: commande)
  #   type: URL              → Envoie un lien cliquable dans le chat (value: URL)
  #   type: MESSAGE          → Envoie un message au joueur (value: texte)
  #   type: OPEN_MENU        → Ouvre le GUI du menu principal (utilisé par la hotbar)
  #   type: CLOSE            → Ferme le menu
  #   type: NONE             → Aucune action (item décoratif)
  #
  # Placeholders disponibles dans name/lore/message :
  #   %player%       → Nom du joueur
  #   %displayname%  → Nom affiché du joueur
  #   %health%       → Points de vie
  #   %level%        → Niveau XP
  #   %world%        → Monde actuel
  #   %ping%         → Ping du joueur
  #   %gamemode%     → Mode de jeu
  #   %food%         → Niveau de faim
  # -------------------------------------------------------
  items:

    # --- Informations du joueur ---
    player_info:
      slot: 4
      material: PLAYER_HEAD
      name: "&e⭐ &6%player%"
      glowing: false
      lore:
        - ""
        - "&7❤ &cVie : &f%health%/20"
        - "&7⚡ &eNiveau : &f%level%"
        - "&7🌍 &bMonde : &f%world%"
        - "&7📶 &aPing : &f%ping% ms"
        - "&7🎮 &dMode : &f%gamemode%"
        - "&7🍖 &6Faim : &f%food%/20"
        - ""
      action:
        type: NONE
        value: ""

    # --- Liste des amis (/friend gui) ---
    friends:
      slot: 37
      material: LIME_DYE
      name: "&a👥 &2Amis"
      glowing: false
      lore:
        - ""
        - "&7Voir et gérer vos amis."
        - ""
        - "&eCliquez pour ouvrir !"
        - ""
      action:
        type: COMMAND
        value: "friend gui"

    # --- Retour au lobby ---
    hub:
      slot: 38
      material: COMPASS
      name: "&b🏠 &3Lobby"
      glowing: true
      lore:
        - ""
        - "&7Retourner au lobby principal."
        - ""
        - "&eCliquez pour vous téléporter !"
        - ""
      action:
        type: CONNECT
        value: "lobby"

    # --- Site internet ---
    website:
      slot: 39
      material: BOOK
      name: "&d🌐 &5Site Internet"
      glowing: false
      lore:
        - ""
        - "&7Visitez notre site officiel."
        - ""
        - "&ewww.votreserveur.fr"
        - ""
        - "&eCliquez pour ouvrir le lien !"
        - ""
      action:
        type: URL
        value: "https://www.votreserveur.fr"

    # --- Discord ---
    discord:
      slot: 40
      material: PURPLE_DYE
      name: "&5💬 &dDiscord"
      glowing: false
      lore:
        - ""
        - "&7Rejoignez notre serveur Discord !"
        - ""
        - "&ediscord.gg/votreserveur"
        - ""
        - "&eCliquez pour ouvrir le lien !"
        - ""
      action:
        type: URL
        value: "https://discord.gg/votreserveur"

    # --- Boutique ---
    shop:
      slot: 41
      material: EMERALD
      name: "&a🛒 &2Boutique"
      glowing: false
      lore:
        - ""
        - "&7Achetez des grades et des cosmétiques."
        - ""
        - "&eCliquez pour ouvrir le lien !"
        - ""
      action:
        type: URL
        value: "https://boutique.votreserveur.fr"

    # --- Vote ---
    vote:
      slot: 42
      material: GOLD_INGOT
      name: "&6🗳 &eVoter"
      glowing: false
      lore:
        - ""
        - "&7Votez pour nous et gagnez des récompenses !"
        - ""
        - "&eCliquez pour voter !"
        - ""
      action:
        type: URL
        value: "https://www.votreserveur.fr/vote"

    # --- Fermer le menu ---
    close:
      slot: 49
      material: BARRIER
      name: "&c✖ &4Fermer"
      glowing: false
      lore:
        - ""
        - "&7Fermer le menu."
        - ""
      action:
        type: CLOSE
        value: ""

    # --- Séparateurs décoratifs (vitres grises) ---
    deco_row0_1: { slot: 0, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row0_2: { slot: 1, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row0_3: { slot: 2, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row0_4: { slot: 3, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row0_5: { slot: 5, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row0_6: { slot: 6, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row0_7: { slot: 7, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row0_8: { slot: 8, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }

    deco_row1_1: { slot: 9,  material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }
    deco_row1_2: { slot: 17, material: GRAY_STAINED_GLASS_PANE, name: " ", lore: [], action: { type: NONE, value: "" } }

